services:
  fraud-detection-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: fraud-detection:local
    command: ["serve"]
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - API_PORT=8000
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts:ro
      - ./configs:/app/configs:ro
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  fraud-detection:
    build:
      context: .
      dockerfile: Dockerfile
    image: fraud-detection:local
    env_file:
      - .env
    volumes:
      - ./artifacts:/app/artifacts
      - ./logs:/app/logs
      - ./mlruns:/app/mlruns
      - ./data_cache:/app/data_cache
      - ./configs:/app/configs:ro
    command: train

  mlflow-ui:
    image: fraud-detection:local
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./mlruns:/app/mlruns
    ports:
      - "5000:5000"
    command: ["mlflow", "ui", "--host", "0.0.0.0", "--port", "5000", "--backend-store-uri", "file:///app/mlruns"]
