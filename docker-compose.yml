services:
  fraud-detection:
    build:
      context: .
      dockerfile: Dockerfile
    image: fraud-detection:local
    env_file:
      - .env
    volumes:
      - ./artifacts:/app/artifacts
      - ./logs:/app/logs
      - ./mlruns:/app/mlruns
      - ./data_cache:/app/data_cache
      - ./configs:/app/configs:ro
    command: train

  mlflow-ui:
    image: fraud-detection:local
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./mlruns:/app/mlruns
    ports:
      - "5000:5000"
    command: ["mlflow", "ui", "--host", "0.0.0.0", "--port", "5000", "--backend-store-uri", "file:///app/mlruns"]
