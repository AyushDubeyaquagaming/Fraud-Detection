  n_clusters: 4
  random_state: 42
  n_init: 10

logistic_regression:
  C: 0.1
  class_weight: "balanced"
  max_iter: 2000
  solver: "lbfgs"

scoring:
  anomaly_weight: 0.60
  supervised_weight: 0.40
