

pipeline:
  artifact_root: "artifacts"
  current_dir: "artifacts/current"
  random_seed: 42

data_ingestion:
  source: "mongodb"
  parquet_path: "data_cache/fraud_modeling_pull.parquet"
  mongodb:
    uri_env_var: "MONGODB_URI"
    database_env_var: "MONGODB_DATABASE"
    collection_env_var: "MONGODB_COLLECTION_ROULETTE_REPORT"
    # Bounded ingestion strategy.
    # date_window  — default; bounds by trans_date. Use for routine weekly retraining.
    # member_list  — targeted cohort extraction and scoring. Not the standard retraining path.
    # full_collection — escape hatch for one-time baseline pulls. Requires confirm_full_pull: true.
    strategy: "date_window"
    strategy_params:
      # trans_date is the default because it aligns to gameplay time, not document write time.
      timestamp_field: "trans_date"
      # Rolling lookback for steady-state weekly operation.
      # For historical backfills aligned to a known label period, comment out lookback_days
      # and set explicit start_date / end_date (ISO-8601 strings, e.g. "2024-01-01").
      lookback_days: 90
      start_date: null
      end_date: null
      # full_collection guard — must be set to true to allow a full-collection pull.
      confirm_full_pull: false

data_validation:
  required_columns:
    - member_id
    - draw_id
    - total_bet_amount
    - win_points
    - bets
  min_row_count: 1000
  fraud_csv_path: "ROULET CHEATING DATA.csv"

feature_engineering:
  exclude_cols: ["member_id", "event_fraud_flag", "primary_ccs_id",
                 "first_fraud_ts", "first_fraud_draw_id", "is_fraud_player"]
  log1p_cols: ["total_staked", "avg_stake_per_draw", "median_stake_per_draw",
               "stake_std", "max_stake_per_draw", "stake_cv",
               "avg_bet_amount_std_in_draw", "avg_bet_amount_mean_in_draw",
               "std_net_result", "pnl_volatility"]
  apply_pre_fraud_cutoff: true

batch_scoring:
  mode: "operational"
  require_labels: false
  # Operational pre-filter applied at SCORING time (not during training). Excludes
  # low-activity players whose scores are statistically unreliable. Training still
  # sees the full cohort so the unsupervised scaler reflects the full population.
  operational_filter:
    enabled: true
    min_draws_played: 10
  # Alert queue size for batch scoring output (maps to analyst review capacity).
  alert_queue_size: 50

model_evaluation:
  # Percentile buckets REPORTED in the evaluation output. The primary gate is at
  # top_5pct; top_20pct is retained only for continuity with historical reports.
  threshold_percentiles: [0.01, 0.05, 0.10, 0.20]
  # Fixed-count buckets that map to operational review capacity (weekly / monthly).
  threshold_fixed_counts: [50, 500]
  # Alert queue size written to alert_queue.csv.
  alert_queue_size: 50
  risk_tier_p80: 0.80
  risk_tier_p95: 0.95
  # --- Phase 2 rebaseline: primary gate is lift + capture_rate at top 5%. ---
  # Cohort-size-independent thresholds that translate across 1K and 1M cohorts alike.
  min_capture_rate_top_5pct: 0.40   # top 5% must catch >=40% of known fraud
  min_lift_top_5pct: 5.0            # top 5% precision must be >=5x base rate
  # Retained for diagnostic reporting only — not used as a gate after rebaseline.
  min_capture_top_20pct: 0

mlflow:
  tracking_uri_env_var: "MLFLOW_TRACKING_URI"
  experiment_name: "fraud_detection_hybrid"
  registered_model_name: "fraud_detection_hybrid"

serving:
  artifact_provider: "local_disk"
  current_dir: "artifacts/current"
  manifest_file: "serving_manifest.json"
  model_version: "hybrid_v1"
  host: "127.0.0.1"
  port: 8000

monitoring:
  enabled: true
  reports_dir: "monitoring"
  sample_size: 50000
  reference_from_current_metadata: true
  monitored_features:
    - template_reuse_ratio
    - avg_entropy
    - avg_tiny_bet_ratio
    - total_staked
    - avg_stake_per_draw
    - draws_played
    - avg_inter_draw_seconds
    - positive_draw_rate
  drift_threshold: 0.3
